<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incident Report | Aramco Appendix 8</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f6f9; padding: 15px; margin: 0; }
        .container { max-width: 950px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 4px solid #ff9800; padding-bottom: 15px; margin-bottom: 25px; }
        .header h1 { color: #e65100; margin: 0; font-size: 24px; }
        .section-box { border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 20px; background: #fff8e1; }
        .section-box h3 { margin-top: 0; font-size: 16px; color: #ff9800; border-bottom: 1px dashed #ff9800; padding-bottom: 5px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        label { font-size: 12px; font-weight: 600; display: block; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: 'Poppins'; font-size: 13px; }
        
        /* 🏥 Body Part Selection Grid */
        .body-parts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; background: white; padding: 10px; border-radius: 5px; }
        .check-item { display: flex; align-items: center; gap: 8px; font-size: 12px; }

        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
        button, .btn-link { padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-decoration: none; display: flex; align-items: center; justify-content: center; flex: 1; min-width: 120px; }
        .btn-save { background: #1976d2; color: white; }
        .btn-pdf { background: #2e7d32; color: white; }
        .btn-back { background: #607d8b; color: white; }

        @media print { .no-print { display: none !important; } .container { box-shadow: none; width: 100%; } body { padding: 0; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚨 Incident / Near Miss Report</h1>
            <p style="font-size: 12px; color: #666;">Official Aramco Standard - Appendix 8</p>
        </div>

        <div class="section-box">
            <h3>1. WHAT HAPPENED?</h3>
            <div class="grid">
                <div><label>Incident Type:</label>
                    <select id="inc_type">
                        <option>Incident (Injury/Damage)</option>
                        <option>Near Miss (Potential Loss)</option>
                    </select>
                </div>
                <div><label>Classification:</label>
                    <select id="inc_class"><option>Major</option><option>Serious</option><option>Minor</option></select>
                </div>
                <div><label>Damage/Loss To:</label>
                    <div class="check-item"><input type="checkbox"> People</div>
                    <div class="check-item"><input type="checkbox"> Property</div>
                </div>
            </div>
            <div style="margin-top: 10px;"><label>Short Description:</label><textarea id="desc"></textarea></div>
        </div>

        <div class="section-box" style="background: #fdf2f2; border-left: 5px solid #d32f2f;">
            <h3>2. INJURED PERSON DETAILS</h3>
            <div class="grid">
                <div><label>Full Name:</label><input type="text" id="p_name"></div>
                <div><label>Staff ID / Badge:</label><input type="text" id="p_id"></div>
                <div><label>Occupation:</label><input type="text" id="p_occ"></div>
            </div>
            
            <p style="font-size: 13px; font-weight: bold; margin: 15px 0 5px;">Body Part(s) Affected (Aramco List):</p>
            <div class="body-parts-grid">
                <div class="check-item"><input type="checkbox"> Head / Face</div>
                <div class="check-item"><input type="checkbox"> Eye (Left/Right)</div>
                <div class="check-item"><input type="checkbox"> Back (Upper/Lower)</div>
                <div class="check-item"><input type="checkbox"> Hand / Finger</div>
                <div class="check-item"><input type="checkbox"> Leg / Foot</div>
                <div class="check-item"><input type="checkbox"> Chest / Stomach</div>
            </div>

            <div class="grid" style="margin-top: 15px;">
                <div><label>Injury Type:</label>
                    <select>
                        <option>Laceration / Cut</option>
                        <option>Fracture / Break</option>
                        <option>Burn (Heat/Chemical)</option>
                        <option>Amputation</option>
                    </select>
                </div>
                <div><label>Lost Working Days:</label><input type="number" placeholder="0"></div>
                <div><label>PPE Being Used?</label><select><option>Yes</option><option>No</option></select></div>
            </div>
        </div>

        <div class="btn-group no-print">
            <a href="index.html" class="btn-link btn-back">⬅️ Back</a>
            <button class="btn-save" onclick="saveData()">💾 Save Draft</button>
            <button class="btn-pdf" onclick="window.print()">📄 Generate Official PDF</button>
        </div>
    </div>

    <script>
        function saveData() {
            const data = { desc: document.getElementById('desc').value, name: document.getElementById('p_name').value };
            localStorage.setItem('aramco_incident_data', JSON.stringify(data));
            alert("Draft Saved in Browser Memory!");
        }
    </script>
</body>
</html>
