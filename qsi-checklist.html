<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QSI Inspection | Aramco Appendix 6</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f6f9; padding: 15px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 4px solid #1976d2; padding-bottom: 15px; margin-bottom: 25px; }
        .header h1 { color: #1565c0; margin: 0; font-size: 24px; }
        
        .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; background: #e3f2fd; padding: 15px; border-radius: 8px; }
        .info-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; }
        .info-group input { width: 100%; padding: 8px; border: 1px solid #90caf9; border-radius: 4px; box-sizing: border-box; }

        .section-title { background: #1976d2; color: white; padding: 10px; margin-top: 20px; border-radius: 5px; font-size: 15px; font-weight: 600; }
        
        .table-responsive { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; font-size: 13px; }
        th { background: #f1f8ff; color: #1565c0; }
        
        .status-cell { text-align: center; width: 100px; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 25px; }
        button, .btn-link { padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-decoration: none; display: flex; align-items: center; justify-content: center; flex: 1; min-width: 120px; font-family: 'Poppins'; }
        .btn-save { background: #1976d2; color: white; }
        .btn-load { background: #f57c00; color: white; }
        .btn-pdf { background: #2e7d32; color: white; }
        .btn-back { background: #607d8b; color: white; }

        @media print { .no-print { display: none !important; } .container { box-shadow: none; border: none; width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✅ QSI General Inspection</h1>
            <p style="font-size: 12px; color: #666;">Based on Saudi Aramco SSMS Appendix 6</p>
        </div>

        <div class="info-grid">
            <div class="info-group"><label>Facility/Area:</label><input type="text" id="qsi_area"></div>
            <div class="info-group"><label>Inspector Name:</label><input type="text" id="qsi_name"></div>
            <div class="info-group"><label>Date:</label><input type="date" id="qsi_date"></div>
        </div>

        <div id="qsi-content">
            </div>

        <div class="btn-group no-print">
            <a href="index.html" class="btn-link btn-back">⬅️ Back</a>
            <button class="btn-save" onclick="saveQSI()">💾 Save Draft</button>
            <button class="btn-load" onclick="loadQSI()">🔄 Load Draft</button>
            <button class="btn-pdf" onclick="window.print()">📄 Save PDF</button>
        </div>
    </div>

    <script>
        const qsiData = [
            {
                title: "FIRE PROTECTION & SAFETY",
                items: [
                    "Are fire extinguishers charged and inspected monthly?",
                    "Are fire hydrants/monitors accessible and clear?",
                    "Are Halon/CO2 systems in auto-mode and inspected?",
                    "Are windsocks in good condition and visible?",
                    "Are H2S/Combustible gas alarms working?"
                ]
            },
            {
                title: "PLANT & EQUIPMENT",
                items: [
                    "Are pressure gauges within calibration date?",
                    "Are safety relief valves (SRV) seals intact?",
                    "Are rotating equipment guards in place?",
                    "Is scaffolding tagged (Green) and inspected?",
                    "Are electrical panels locked and rubber mats present?"
                ]
            },
            {
                title: "PROCEDURES & PERSONNEL",
                items: [
                    "Are work permits (Safe/Hot/Confined) properly displayed?",
                    "Are employees using correct PPE for the task?",
                    "Are MSDS/SDS sheets available for chemicals?",
                    "Is emergency evacuation map displayed?"
                ]
            }
        ];

        const container = document.getElementById('qsi-content');

        qsiData.forEach((section, sIdx) => {
            let rows = section.items.map((item, iIdx) => `
                <tr>
                    <td>${item}</td>
                    <td class="status-cell">
                        <select id="q_${sIdx}_${iIdx}">
                            <option value="Pass">Pass</option>
                            <option value="Fail">Fail</option>
                            <option value="N/A">N/A</option>
                        </select>
                    </td>
                    <td><input type="text" id="o_${sIdx}_${iIdx}" style="width:100%; border:none; border-bottom:1px solid #eee;" placeholder="Notes..."></td>
                </tr>
            `).join('');

            container.innerHTML += `
                <div class="section-title">${section.title}</div>
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr><th>Audit Question</th><th>Status</th><th>Observations</th></tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
            `;
        });

        function saveQSI() {
            const data = { area: document.getElementById('qsi_area').value, date: document.getElementById('qsi_date').value, responses: {} };
            qsiData.forEach((sec, sIdx) => {
                sec.items.forEach((_, iIdx) => {
                    data.responses[`q_${sIdx}_${iIdx}`] = document.getElementById(`q_${sIdx}_${iIdx}`).value;
                    data.responses[`o_${sIdx}_${iIdx}`] = document.getElementById(`o_${sIdx}_${iIdx}`).value;
                });
            });
            localStorage.setItem('aramco_qsi_data', JSON.stringify(data));
            alert("✅ QSI Draft Saved!");
        }

        function loadQSI() {
            const data = JSON.parse(localStorage.getItem('aramco_qsi_data'));
            if(!data) return alert("No data found!");
            document.getElementById('qsi_area').value = data.area;
            document.getElementById('qsi_date').value = data.date;
            for (let key in data.responses) {
                const el = document.getElementById(key);
                if(el) el.value = data.responses[key];
            }
            alert("🔄 Data Loaded!");
        }
    </script>
</body>
</html>
