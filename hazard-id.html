<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Hazard ID | Aramco Standard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f6f9; padding: 15px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 3px solid #00695c; padding-bottom: 15px; margin-bottom: 25px; }
        .header h1 { color: #00695c; margin: 0; font-size: 24px; }
        .header p { color: #666; font-size: 14px; margin-top: 5px; }

        /* Form Info Section */
        .info-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 25px; background: #f1f8e9; padding: 15px; border-radius: 8px; }
        .info-group label { display: block; font-size: 12px; font-weight: 600; color: #333; margin-bottom: 5px; }
        .info-group input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }

        /* Hazard Items */
        .hazard-card { border: 1px solid #e0e0e0; border-radius: 8px; margin-bottom: 15px; overflow: hidden; }
        .hazard-title { background: #00695c; color: white; padding: 10px 15px; font-size: 15px; font-weight: 600; display: flex; justify-content: space-between; }
        .sub-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 15px; border-bottom: 1px solid #eee; background: #fff; }
        .sub-item:last-child { border-bottom: none; }
        .sub-item label { font-size: 13px; color: #444; flex: 1; margin-right: 10px; }
        .sub-item input[type="checkbox"] { transform: scale(1.3); cursor: pointer; }
        
        .observation-input { width: 100%; margin-top: 5px; padding: 6px; border: 1px dashed #999; border-radius: 4px; font-size: 12px; display: none; }

        /* Buttons */
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 30px; }
        button, .btn-link { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; flex: 1; }
        .btn-save { background: #1976d2; color: white; }
        .btn-load { background: #f57c00; color: white; }
        .btn-pdf { background: #2e7d32; color: white; }
        .btn-back { background: #607d8b; color: white; }

        @media print { 
            .no-print { display: none !important; } 
            .container { box-shadow: none; border: none; padding: 0; width: 100%; }
            .hazard-card { page-break-inside: avoid; }
            .observation-input { display: block !important; border: none; border-bottom: 1px solid #ccc; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚠️ Master Hazard Identification</h1>
            <p>Aramco Suppliers Safety Management System (Appendix 1)</p>
        </div>

        <div class="info-section">
            <div class="info-group"><label>Location/Task:</label><input type="text" id="loc" placeholder="e.g. Unit 4, Maintenance"></div>
            <div class="info-group"><label>Assessor Name:</label><input type="text" id="name"></div>
            <div class="info-group"><label>Date:</label><input type="date" id="date"></div>
        </div>

        <div id="hazard-container">
            </div>

        <div class="btn-group no-print">
            <a href="index.html" class="btn-link btn-back">⬅️ Back</a>
            <button class="btn-save" onclick="saveHazards()">💾 Save Draft</button>
            <button class="btn-load" onclick="loadHazards()">🔄 Load Draft</button>
            <button class="btn-pdf" onclick="window.print()">📄 Save as PDF</button>
        </div>
    </div>

    <script>
        // Official Saudi Aramco Hazard Categories (Appendix 1)
        const aramcoHazards = [
            { id: 1, title: "1. FALLS OR FALLING OBJECTS", items: ["Use of Access Equipment", "Falls of people from height", "Falls of objects from height", "Slips, trips or falls on level"] },
            { id: 2, title: "2. MANUAL HANDLING", items: ["Risk of injury from single incident", "Cumulative effect of handling loads"] },
            { id: 3, title: "3. PORTABLE HAND TOOLS", items: ["Unsuitable/inappropriate use", "Poorly maintained", "Inherently dangerous (e.g. knives)"] },
            { id: 4, title: "4. MACHINERY & PLANTS", items: ["Entrapment / Entanglement", "Ovens / Furnaces", "Refrigeration plant", "Pallet Stacker"] },
            { id: 5, title: "5. VEHICLES", items: ["Fork Lift Trucks", "Free moving (Premises & Roads)"] },
            { id: 6, title: "6. FIRES", items: ["Process related", "Materials in storage", "Detection/Prevention failure", "Burn hazards", "Electrical fires"] },
            { id: 7, title: "7. EXPLOSIONS", items: ["Pressure / Air / Steam", "Chemical reactions", "Dust clouds", "Implosion"] },
            { id: 8, title: "8. CHEMICAL / DUSTS", items: ["Asphyxiating", "Toxic / Harmful / Irritant", "Corrosive", "Dermatitis", "Carcinogenic / Mutagenic"] },
            { id: 9, title: "9. BIOLOGICAL AGENTS", items: ["Contact with animals", "Microorganisms (Hepatitis, etc)", "Human blood/fluids"] },
            { id: 11, title: "11. ELECTRICITY", items: ["Shock / Burns", "Work on live equipment", "Lightning"] },
            { id: 17, title: "17. CONFINED SPACES", items: ["Entry into confined spaces"] },
            { id: 20, title: "20. WELDING", items: ["Electric welding", "Oxyacetylene welding"] },
            { id: 23, title: "23. ANY OTHER", items: ["Flooding, etc"] }
        ];

        const container = document.getElementById('hazard-container');

        aramcoHazards.forEach(cat => {
            let itemsHTML = cat.items.map((item, idx) => `
                <div class="sub-item">
                    <label>${item}</label>
                    <input type="checkbox" class="haz-check" id="haz_${cat.id}_${idx}" onchange="toggleObs(this)">
                    <input type="text" class="observation-input" id="obs_${cat.id}_${idx}" placeholder="Describe specific hazard...">
                </div>
            `).join('');

            container.innerHTML += `
                <div class="hazard-card">
                    <div class="hazard-title">${cat.title}</div>
                    ${itemsHTML}
                </div>`;
        });

        function toggleObs(cb) {
            const obs = document.getElementById(cb.id.replace('haz', 'obs'));
            obs.style.display = cb.checked ? 'block' : 'none';
        }

        function saveHazards() {
            const data = { loc: document.getElementById('loc').value, name: document.getElementById('name').value, date: document.getElementById('date').value, checks: {} };
            document.querySelectorAll('.haz-check').forEach(cb => {
                if(cb.checked) data.checks[cb.id] = document.getElementById(cb.id.replace('haz','obs')).value;
            });
            localStorage.setItem('aramco_hazard_id', JSON.stringify(data));
            alert("✅ Hazard ID Draft Saved!");
        }

        function loadHazards() {
            const data = JSON.parse(localStorage.getItem('aramco_hazard_id'));
            if (!data) return alert("❌ No saved data found!");
            document.getElementById('loc').value = data.loc;
            document.getElementById('name').value = data.name;
            document.getElementById('date').value = data.date;
            Object.keys(data.checks).forEach(id => {
                const cb = document.getElementById(id);
                if(cb) {
                    cb.checked = true;
                    const obs = document.getElementById(id.replace('haz','obs'));
                    obs.value = data.checks[id];
                    obs.style.display = 'block';
                }
            });
            alert("🔄 Data Loaded Successfully!");
        }
        // 🔄 Settings se Data Auto-Fill karne ka Magic Code
    window.addEventListener('load', () => {
        const gComp = localStorage.getItem('g_comp');
        const gCont = localStorage.getItem('g_cont');
        const gName = localStorage.getItem('g_name');
        const gSite = localStorage.getItem('g_site');

        if(gComp && document.getElementById('comp_name')) document.getElementById('comp_name').value = gComp;
        if(gCont && document.getElementById('cont_no')) document.getElementById('cont_no').value = gCont;
        if(gName && document.getElementById('auditor')) document.getElementById('auditor').value = gName;
        if(gSite && document.getElementById('facility')) document.getElementById('facility').value = gSite;
        if(gSite && document.getElementById('fac_area')) document.getElementById('fac_area').value = gSite;
    });
    </script>
</body>
</html>
