<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Report | Aramco Appendix 12</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f6f9; padding: 15px; margin: 0; }
        .container { max-width: 950px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 4px solid #d84315; padding-bottom: 10px; margin-bottom: 25px; }
        .header h1 { color: #d84315; font-size: 24px; margin: 0; }
        .form-section { border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid #d84315; }
        .form-section h3 { margin-top: 0; font-size: 16px; color: #d84315; border-bottom: 1px dashed #ddd; padding-bottom: 5px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        label { font-size: 12px; font-weight: 600; display: block; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: 'Poppins'; font-size: 13px; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
        button, .btn-link { padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-decoration: none; display: flex; align-items: center; justify-content: center; flex: 1; }
        @media print { .no-print { display: none !important; } .container { box-shadow: none; border: none; width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>📋 Safety Audit Report</h1><p>Aramco Standard - Appendix 12</p></div>

        <div class="form-section">
            <h3>AUDIT FINDINGS & SUMMARY</h3>
            <div style="margin-bottom:15px;"><label>Overall Audit Summary:</label><textarea id="a_summary"></textarea></div>
            
            <div style="margin-bottom:15px; background: #fff8f1; padding: 10px; border-radius: 5px; border: 1px dashed #d84315;">
                <label style="color: #d84315;">📁 Traceable Evidence (List of Photos/Docs):</label>
                <textarea id="a_evidence" rows="2" placeholder="e.g. 1. Photo Ref 001, 2. Training Log Ref 05, 3. PTW Copy..."></textarea>
                <small style="color: #666; font-size: 10px;">List the evidence documents/photos that prove your audit findings.</small>
            </div>

            <div class="grid">
                <div><label>Strengths:</label><textarea id="a_strength"></textarea></div>
                <div><label>Areas for Improvement:</label><textarea id="a_improve"></textarea></div>
            </div>
            <div class="grid" style="margin-top:15px;">
                <div><label>Final Result:</label><select><option>Pass</option><option>Fail</option><option>Excellent</option></select></div>
                <div><label>Audit Status:</label><select><option>Open</option><option>Closed</option></select></div>
            </div>
        </div>

        <div class="btn-group no-print">
            <a href="index.html" class="btn-link" style="background:#607d8b; color:white;">⬅️ Back</a>
            <button style="background:#1976d2; color:white;" onclick="saveAudit()">💾 Save Draft</button>
            <button style="background:#2e7d32; color:white;" onclick="window.print()">📄 Save PDF Report</button>
        </div>
    </div>

    <script>
        function saveAudit() {
            const data = { summary: document.getElementById('a_summary').value, evidence: document.getElementById('a_evidence').value };
            localStorage.setItem('aramco_audit_v2', JSON.stringify(data));
            alert("Audit Saved!");
        }
    </script>
</body>
</html>
