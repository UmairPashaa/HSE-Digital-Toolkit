<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPA Tracker | Aramco Standard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2e7d32; --secondary: #388e3c; --bg: #f0f2f5; --border: #bdc3c7; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; border: 2px solid #333; }
        
        /* Official Header Style */
        .official-header { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 2px solid #333; background: #fafafa; }
        .header-title { text-align: left; }
        .header-title h1 { margin: 0; font-size: 20px; color: #1b5e20; text-transform: uppercase; }
        .header-title p { margin: 2px 0; font-size: 11px; color: #555; font-weight: bold; }

        /* Form Grid Layout */
        .form-grid { display: grid; grid-template-columns: repeat(4, 1fr); border-bottom: 1px solid #333; }
        .cell { border-right: 1px solid #333; padding: 8px; }
        .cell:last-child { border-right: none; }
        .cell label { display: block; font-size: 10px; font-weight: 700; color: #333; text-transform: uppercase; margin-bottom: 3px; }
        .cell input, .cell select { width: 100%; border: none; font-size: 13px; font-family: 'Poppins'; outline: none; background: transparent; }

        .section-bar { background: #333; color: white; padding: 5px 15px; font-size: 13px; font-weight: 600; text-transform: uppercase; }
        
        .full-cell { padding: 10px; border-bottom: 1px solid #333; }
        .full-cell label { font-size: 11px; font-weight: 700; display: block; margin-bottom: 5px; }
        .full-cell textarea { width: 100%; border: 1px solid #eee; height: 60px; font-family: 'Poppins'; resize: none; font-size: 13px; }

        /* Action Table */
        .action-table { width: 100%; border-collapse: collapse; }
        .action-table th { background: #f2f2f2; border: 1px solid #333; padding: 8px; font-size: 11px; }
        .action-table td { border: 1px solid #333; padding: 0; }

        .btn-group { display: flex; gap: 10px; padding: 20px; background: var(--bg); }
        .btn { padding: 12px; border: none; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; flex: 1; text-align: center; text-decoration: none; font-size: 13px; }

        @media print {
            .no-print { display: none !important; }
            body { padding: 0; background: white; }
            .container { border: 2px solid #000; width: 100%; }
            @page { size: portrait; margin: 10mm; }
        }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>
    <div class="container" id="printable-area">
        <div class="official-header">
            <div class="header-title">
                <h1>Corrective & Preventive Action (CAPA)</h1>
                <p>PURSUANT TO SAUDI Aramco SSMS APPENDIX 11</p>
            </div>
            <div style="text-align: right; font-size: 10px; font-weight: bold;">
                FORM ID: SA-SSMS-11<br>REVISION: 02
            </div>
        </div>

        <div class="form-grid">
            <div class="cell"><label>CAPA Ref No:</label><input type="text" id="capa_ref" placeholder="CP-001"></div>
            <div class="cell"><label>Date Issued:</label><input type="date" id="capa_date"></div>
            <div class="cell"><label>Source:</label>
                <select id="capa_source"><option>Audit</option><option>Inspection</option><option>Incident</option></select>
            </div>
            <div class="cell"><label>Priority:</label>
                <select id="capa_priority"><option>High</option><option>Medium</option><option>Low</option></select>
            </div>
        </div>

        <div class="section-bar">Section 1: Non-Conformance Details</div>
        <div class="full-cell">
            <label>Description of Deficiency/Finding:</label>
            <textarea id="capa_desc"></textarea>
        </div>
        <div class="full-cell">
            <label>Root Cause Analysis (Why did it happen?):</label>
            <textarea id="capa_root"></textarea>
        </div>

        <div class="section-bar">Section 2: Action Plan & Verification</div>
        <table class="action-table">
            <tr>
                <th>Corrective / Preventive Actions</th>
                <th width="150">Owner</th>
                <th width="120">Target Date</th>
            </tr>
            <tr>
                <td><textarea id="capa_action" style="border:none; height:80px;"></textarea></td>
                <td><input type="text" id="capa_owner" class="input-cell" style="padding:10px;"></td>
                <td><input type="date" id="capa_target" class="input-cell" style="padding:10px;"></td>
            </tr>
        </table>

        <div class="section-bar" style="background: #1b5e20;">Section 3: Evidence of Closure (Aramco Requirement)</div>
        <div class="form-grid">
            <div class="cell" style="grid-column: span 3;">
                <label>Evidence Reference (Photo ID / Document No / Link):</label>
                <input type="text" id="capa_evidence" placeholder="e.g. Photo_Ref_01, JSA-Update-Rev01">
            </div>
            <div class="cell">
                <label>Status:</label>
                <select id="capa_status"><option>OPEN</option><option>CLOSED</option></select>
            </div>
        </div>
        <div class="full-cell">
            <label>Verification Comments by HSE/Auditor:</label>
            <textarea id="capa_verify"></textarea>
        </div>
    </div>

    <div class="btn-group no-print">
        <a href="index.html" class="btn" style="background:#607d8b;">Back</a>
        <button class="btn" style="background:#1976d2;" onclick="saveData()">💾 Save Draft</button>
        <button class="btn" style="background:#f57c00;" onclick="loadData()">🔄 Load Draft</button>
        <button class="btn" style="background:#2e7d32;" onclick="window.print()">📄 Print / PDF</button>
    </div>

    <script>
        function saveData() {
            const fields = ['capa_ref', 'capa_date', 'capa_source', 'capa_priority', 'capa_desc', 'capa_root', 'capa_action', 'capa_owner', 'capa_target', 'capa_evidence', 'capa_status', 'capa_verify'];
            const data = {};
            fields.forEach(f => data[f] = document.getElementById(f).value);
            localStorage.setItem('aramco_capa_master', JSON.stringify(data));
            alert("✅ CAPA Template Saved!");
        }
        function loadData() {
            const data = JSON.parse(localStorage.getItem('aramco_capa_master'));
            if(!data) return alert("No saved data!");
            Object.keys(data).forEach(key => document.getElementById(key).value = data[key]);
            alert("🔄 Data Loaded!");
        }
    </script>
</body>
</html>
