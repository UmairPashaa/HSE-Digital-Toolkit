<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training Matrix | HSE Toolkit</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f6f9; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 10px; }
        .header { text-align: center; border-bottom: 3px solid #f4511e; margin-bottom: 25px; }
        .header h1 { color: #f4511e; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 12px; }
        th { background: #fbe9e7; }
        .input-cell { width: 100%; border: none; text-align: center; font-family: 'Poppins'; }
        .status-select { border: none; background: transparent; cursor: pointer; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button, .btn-link { padding: 10px 15px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 13px; }
        .btn-add { background: #f4511e; color: white; }
        .btn-save { background: #1976d2; color: white; }
        .btn-load { background: #f57c00; color: white; }
        .btn-pdf { background: #2e7d32; color: white; margin-left: auto; }
        .btn-back { background: #607d8b; color: white; }
        @media print { .no-print { display: none; } table { font-size: 10px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Training & Competency Matrix</h1>
            <p>Track Safety Training & Certification Status</p>
        </div>

        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th rowspan="2">Worker Name / ID</th>
                        <th colspan="5">Safety Training Modules (Status)</th>
                    </tr>
                    <tr>
                        <th>HSE Induction</th>
                        <th>Fire Safety</th>
                        <th>First Aid</th>
                        <th>Work at Height</th>
                        <th>H2S / Gas Testing</th>
                    </tr>
                </thead>
                <tbody id="matrix-body">
                    <tr>
                        <td><input type="text" class="input-cell" placeholder="Enter Name..."></td>
                        <td><select class="status-select"><option>Due</option><option>Valid</option><option>Expired</option></select></td>
                        <td><select class="status-select"><option>Due</option><option>Valid</option><option>Expired</option></select></td>
                        <td><select class="status-select"><option>Due</option><option>Valid</option><option>Expired</option></select></td>
                        <td><select class="status-select"><option>Due</option><option>Valid</option><option>Expired</option></select></td>
                        <td><select class="status-select"><option>Due</option><option>Valid</option><option>Expired</option></select></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="btn-group no-print">
            <a href="index.html" class="btn-link btn-back">⬅️ Back</a>
            <button class="btn-add" onclick="addNewRow()">➕ Add Worker</button>
            <button class="btn-save" onclick="saveMatrix()">💾 Save Matrix</button>
            <button class="btn-load" onclick="loadMatrix()">🔄 Load Matrix</button>
            <button class="btn-pdf" onclick="window.print()">📄 Save PDF</button>
        </div>
    </div>

    <script>
        function addNewRow() {
            const row = `<tr><td><input type="text" class="input-cell" placeholder="Enter Name..."></td><td><select class="status-select"><option>Due</option><option>Valid</option><option>Expired</option></select></td><td><select class="status-select"><option>Due</option><option>Valid</option><option>Expired</option></select></td><td><select class="status-select"><option>Due</option><option>Valid</option><option>Expired</option></select></td><td><select class="status-select"><option>Due</option><option>Valid</option><option>Expired</option></select></td><td><select class="status-select"><option>Due</option><option>Valid</option><option>Expired</option></select></td></tr>`;
            document.getElementById('matrix-body').insertAdjacentHTML('beforeend', row);
        }

        function saveMatrix() {
            const rows = [];
            document.querySelectorAll('#matrix-body tr').forEach(tr => {
                const inputs = tr.querySelectorAll('input, select');
                rows.push({ name: inputs[0].value, t1: inputs[1].value, t2: inputs[2].value, t3: inputs[3].value, t4: inputs[4].value, t5: inputs[5].value });
            });
            localStorage.setItem('training_matrix_data', JSON.stringify(rows));
            alert("✅ Matrix saved successfully!");
        }

        function loadMatrix() {
            const data = JSON.parse(localStorage.getItem('training_matrix_data'));
            if (!data) return alert("❌ No saved data found!");
            const body = document.getElementById('matrix-body');
            body.innerHTML = '';
            data.forEach(d => {
                const row = `<tr><td><input type="text" class="input-cell" value="${d.name}"></td><td><select class="status-select"><option ${d.t1==='Due'?'selected':''}>Due</option><option ${d.t1==='Valid'?'selected':''}>Valid</option><option ${d.t1==='Expired'?'selected':''}>Expired</option></select></td><td><select class="status-select"><option ${d.t2==='Due'?'selected':''}>Due</option><option ${d.t2==='Valid'?'selected':''}>Valid</option><option ${d.t2==='Expired'?'selected':''}>Expired</option></select></td><td><select class="status-select"><option ${d.t3==='Due'?'selected':''}>Due</option><option ${d.t3==='Valid'?'selected':''}>Valid</option><option ${d.t3==='Expired'?'selected':''}>Expired</option></select></td><td><select class="status-select"><option ${d.t4==='Due'?'selected':''}>Due</option><option ${d.t4==='Valid'?'selected':''}>Valid</option><option ${d.t4==='Expired'?'selected':''}>Expired</option></select></td><td><select class="status-select"><option ${d.t5==='Due'?'selected':''}>Due</option><option ${d.t5==='Valid'?'selected':''}>Valid</option><option ${d.t5==='Expired'?'selected':''}>Expired</option></select></td></tr>`;
                body.insertAdjacentHTML('beforeend', row);
            });
            alert("🔄 Matrix loaded!");
        }
    </script>
</body>
</html>
