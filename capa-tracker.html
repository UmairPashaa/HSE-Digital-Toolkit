<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAPA Tracker | Aramco Appendix 11</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f6f9; padding: 15px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 4px solid #8e24aa; padding-bottom: 10px; margin-bottom: 25px; }
        .header h1 { color: #8e24aa; font-size: 24px; margin: 0; }
        .form-section { border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid #8e24aa; }
        .form-section h3 { margin-top: 0; font-size: 16px; color: #8e24aa; border-bottom: 1px dashed #ddd; padding-bottom: 5px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        label { font-size: 12px; font-weight: 600; display: block; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: 'Poppins'; font-size: 13px; }
        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
        button, .btn-link { padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-decoration: none; display: flex; align-items: center; justify-content: center; flex: 1; }
        @media print { .no-print { display: none !important; } .container { box-shadow: none; border: none; width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>🛠️ CAPA Report Form</h1><p>Official Aramco Standard - Appendix 11</p></div>

        <div class="form-section">
            <h3>1. FINDING & ROOT CAUSE</h3>
            <div class="grid">
                <div><label>Date Issued:</label><input type="date" id="c_date"></div>
                <div><label>Ref No:</label><input type="text" id="c_ref"></div>
            </div>
            <div style="margin-top:10px;"><label>Description of Non-Conformance:</label><textarea id="c_desc"></textarea></div>
            <div style="margin-top:10px;"><label>Root Cause Analysis:</label><textarea id="c_root"></textarea></div>
        </div>

        <div class="form-section">
            <h3>2. CORRECTIVE & PREVENTIVE ACTIONS</h3>
            <div class="grid">
                <div><label>Action Owner:</label><input type="text" id="c_owner"></div>
                <div><label>Target Date:</label><input type="date" id="c_target"></div>
                <div><label>Status:</label><select id="c_status"><option>Open</option><option>Closed</option></select></div>
            </div>
            <div style="margin-top:10px;"><label>Action to be Taken:</label><textarea id="c_action"></textarea></div>
        </div>

        <div class="form-section" style="background: #f3e5f5;">
            <h3>3. VERIFICATION & EVIDENCE (ARAMCO REQUIREMENT)</h3>
            <div class="form-group" style="margin-bottom: 15px;">
                <label style="color: #8e24aa;">🔗 Evidence of Closure (Photo Ref / Doc Link):</label>
                <input type="text" id="c_evidence" placeholder="e.g. Photo_Site_Update_01.jpg or Google Drive Link">
                <small style="color: #666; font-size: 10px;">Mention the photo name or link as proof of action taken.</small>
            </div>
            <div style="margin-top:10px;"><label>Auditor Verification Comments:</label><textarea id="c_verify"></textarea></div>
        </div>

        <div class="btn-group no-print">
            <a href="index.html" class="btn-link" style="background:#607d8b; color:white;">⬅️ Back</a>
            <button style="background:#1976d2; color:white;" onclick="saveCAPA()">💾 Save Draft</button>
            <button style="background:#2e7d32; color:white;" onclick="window.print()">📄 Save PDF</button>
        </div>
    </div>

    <script>
        function saveCAPA() {
            const data = { ref: document.getElementById('c_ref').value, evidence: document.getElementById('c_evidence').value };
            localStorage.setItem('aramco_capa_v2', JSON.stringify(data));
            alert("Draft Saved!");
        }
    </script>
</body>
</html>
