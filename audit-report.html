<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safety Audit Report | Aramco Standard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f6f9; padding: 15px; margin: 0; }
        .container { max-width: 950px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; border-bottom: 4px solid #d84315; padding-bottom: 15px; margin-bottom: 25px; }
        .header h1 { color: #bf360c; margin: 0; font-size: 24px; }
        
        .form-section { border: 1px solid #ddd; padding: 15px; border-radius: 8px; margin-bottom: 20px; background: #fffbfb; border-left: 5px solid #d84315; }
        .form-section h3 { margin-top: 0; font-size: 16px; color: #d84315; border-bottom: 1px dashed #ffab91; padding-bottom: 5px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        label { font-size: 12px; font-weight: 600; display: block; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-family: 'Poppins'; font-size: 13px; }
        
        .table-responsive { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; font-size: 13px; }
        th { background: #fbe9e7; color: #d84315; }

        .btn-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 25px; }
        button, .btn-link { padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-decoration: none; display: flex; align-items: center; justify-content: center; flex: 1; min-width: 120px; }
        .btn-save { background: #1976d2; color: white; }
        .btn-load { background: #f57c00; color: white; }
        .btn-pdf { background: #2e7d32; color: white; }
        .btn-back { background: #607d8b; color: white; }

        @media print { 
            .no-print { display: none !important; } 
            .container { box-shadow: none; width: 100%; border: none; }
            .form-section { background: white !important; page-break-inside: avoid; }
            textarea { height: auto !important; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Safety Audit Report</h1>
            <p style="font-size: 12px; color: #666;">Saudi Aramco Suppliers Safety Management System (Appendix 12)</p>
        </div>

        <div class="form-section">
            <h3>1. AUDIT PLAN & DETAILS</h3>
            <div class="grid">
                <div><label>Reference Number:</label><input type="text" id="audit_ref" placeholder="e.g. AUD-2024-001"></div>
                <div><label>Audit Title:</label><input type="text" id="audit_title"></div>
                <div><label>Type:</label>
                    <select id="audit_type"><option>Safety</option><option>Environmental</option><option>Quality</option></select>
                </div>
                <div><label>Source:</label>
                    <select id="audit_source"><option>Internal Audit</option><option>External Audit</option></select>
                </div>
            </div>
            <div class="grid" style="margin-top: 15px;">
                <div><label>Planned Date:</label><input type="date" id="p_date"></div>
                <div><label>Actual Date:</label><input type="date" id="a_date"></div>
                <div><label>Location/Department:</label><input type="text" id="loc"></div>
            </div>
        </div>

        <div class="form-section">
            <h3>2. WHO WILL DO THE AUDIT?</h3>
            <div class="grid">
                <div><label>Lead Auditor:</label><input type="text" id="lead_auditor"></div>
                <div><label>Auditor(s):</label><input type="text" id="auditors"></div>
                <div><label>Auditee(s):</label><input type="text" id="auditees"></div>
            </div>
        </div>

        <div class="form-section">
            <h3>3. OVERALL AUDIT SUMMARY</h3>
            <div><label>General Summary:</label><textarea id="summary" rows="3"></textarea></div>
            <div style="margin-top:10px;"><label>Strengths (Positive Aspects):</label><textarea id="strengths" rows="2"></textarea></div>
            <div style="margin-top:10px;"><label>Areas for Improvement (Non-Conformances):</label><textarea id="improvements" rows="2"></textarea></div>
            <div style="margin-top:10px;"><label>Observations:</label><textarea id="observations" rows="2"></textarea></div>
            
            <div class="grid" style="margin-top: 15px;">
                <div><label>Status of Audit:</label>
                    <select id="status"><option>Planned</option><option>In Progress</option><option>Completed</option><option>Closed</option></select>
                </div>
                <div><label>Final Result:</label>
                    <select id="result"><option>Fail</option><option>Pass</option><option>Good</option><option>Excellent</option></select>
                </div>
            </div>
        </div>

        <div class="form-section">
            <h3>4. AUDIT SIGN-OFF</h3>
            <div class="grid">
                <div><label>Lead Auditor Sign-off:</label>
                    <select><option>Accepted</option><option>Rejected</option></select>
                </div>
                <div><label>Department Manager Sign-off:</label>
                    <select><option>Accepted</option><option>Rejected</option></select>
                </div>
            </div>
        </div>

        <div class="btn-group no-print">
            <a href="index.html" class="btn-link btn-back">⬅️ Back</a>
            <button class="btn-save" onclick="saveAudit()">💾 Save Draft</button>
            <button class="btn-load" onclick="loadAudit()">🔄 Load Draft</button>
            <button class="btn-pdf" onclick="window.print()">📄 Save PDF Report</button>
        </div>
    </div>

    <script>
        function saveAudit() {
            const data = {
                ref: document.getElementById('audit_ref').value,
                title: document.getElementById('audit_title').value,
                summary: document.getElementById('summary').value
            };
            localStorage.setItem('aramco_audit_report', JSON.stringify(data));
            alert("✅ Audit Report Draft Saved!");
        }

        function loadAudit() {
            const data = JSON.parse(localStorage.getItem('aramco_audit_report'));
            if(!data) return alert("No saved data found!");
            document.getElementById('audit_ref').value = data.ref;
            document.getElementById('audit_title').value = data.title;
            document.getElementById('summary').value = data.summary;
            alert("🔄 Data Loaded!");
        }
    </script>
</body>
</html>
