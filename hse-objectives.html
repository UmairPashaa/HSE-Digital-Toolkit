<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSE Objectives | Aramco Standard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f6f9; padding: 15px; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 10px; }
        .header { text-align: center; border-bottom: 3px solid #283593; padding-bottom: 15px; margin-bottom: 25px; }
        .header h1 { color: #283593; font-size: 24px; }
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th, td { border: 1px solid #ddd; padding: 12px; font-size: 13px; text-align: center; }
        th { background: #e8eaf6; color: #283593; }
        input { width: 100%; border: none; background: transparent; text-align: center; font-family: 'Poppins'; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        button, .btn-link { padding: 10px 15px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 13px; flex: 1; }
        .btn-add { background: #283593; color: white; }
        .btn-save { background: #1976d2; color: white; }
        .btn-pdf { background: #2e7d32; color: white; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>🎯 HSE Objectives & Targets</h1><p>Strategic Safety Planning (Appendix 3)</p></div>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr><th>Objective</th><th>Target (%)</th><th>Action Plan</th><th>Responsibility</th><th>Status</th></tr>
                </thead>
                <tbody id="obj-body">
                    <tr>
                        <td><input type="text" placeholder="e.g. Reduce LTIs"></td>
                        <td><input type="text" placeholder="0%"></td>
                        <td><input type="text" placeholder="Training..."></td>
                        <td><input type="text" placeholder="HSE Manager"></td>
                        <td><select><option>On Track</option><option>Delayed</option><option>Done</option></select></td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="btn-group no-print">
            <a href="index.html" class="btn-link" style="background:#607d8b; color:white;">⬅️ Back</a>
            <button class="btn-add" onclick="addRow()">➕ Add Objective</button>
            <button class="btn-save" onclick="saveData()">💾 Save</button>
            <button class="btn-pdf" onclick="window.print()">📄 PDF</button>
        </div>
    </div>
    <script>
        function addRow() {
            const row = `<tr><td><input type="text"></td><td><input type="text"></td><td><input type="text"></td><td><input type="text"></td><td><select><option>On Track</option><option>Delayed</option><option>Done</option></select></td></tr>`;
            document.getElementById('obj-body').insertAdjacentHTML('beforeend', row);
        }
        function saveData() { alert("Strategic Data Saved Locally!"); }
    </script>
</body>
</html>
