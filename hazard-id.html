<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hazard ID | Aramco Standard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #f4f6f9; padding: 15px; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 10px; }
        .header { text-align: center; border-bottom: 3px solid #00695c; padding-bottom: 15px; margin-bottom: 25px; }
        .header h1 { color: #00695c; font-size: 24px; }
        .hazard-item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; }
        .hazard-item label { font-size: 14px; font-weight: 500; }
        .btn-group { display: flex; gap: 10px; margin-top: 25px; }
        button, .btn-link { padding: 10px 20px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; text-decoration: none; font-size: 13px; flex: 1; text-align: center; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header"><h1>⚠️ Master Hazard ID</h1><p>Baseline Identification (Appendix 1)</p></div>
        <div id="hazard-list">
            </div>
        <div class="btn-group no-print">
            <a href="index.html" class="btn-link" style="background:#607d8b; color:white;">⬅️ Back</a>
            <button style="background:#00695c; color:white;" onclick="window.print()">📄 Save PDF</button>
        </div>
    </div>
    <script>
        const hazards = ["Chemical Exposure", "Working at Height", "Confined Space", "Electrical Shock", "High Pressure", "Noise Pollution", "Lifting Operations", "Radiation"];
        const list = document.getElementById('hazard-list');
        hazards.forEach(h => {
            list.innerHTML += `<div class="hazard-item"><span>${h}</span><input type="checkbox"></div>`;
        });
    </script>
</body>
</html>
